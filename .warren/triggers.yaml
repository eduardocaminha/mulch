# .warren/triggers.yaml — scheduled runs for this project.
#
# Each entry is a cron-style trigger. Warren ticks once a minute and
# spawns a run when a trigger is due.
#
# Required fields: id, kind, cron, role.
# Optional fields: seed, timezone (default UTC), prompt.

- id: nightwatch-patrol
  kind: cron
  cron: '0 3 * * 1'
  role: cam-nightwatch
  timezone: America/Los_Angeles
  prompt: |
    Scan this repo for quality issues. Follow your procedure exactly.
    Today's date is {{date}}. If you find issues, file a plan. If the
    codebase is clean, report clean and exit.

- id: bugwatch-triage
  kind: cron
  cron: '0 8 * * 4'
  role: cam-bugwatch
  timezone: America/Los_Angeles
  prompt: |
    Triage open bug seeds and plan fixes. Follow your procedure exactly.
    Today's date is {{date}}. If no bugs qualify, report clean and exit.

- id: syncwatch-reconcile
  kind: cron
  cron: '0 6 * * *'
  role: cam-syncwatch
  timezone: America/Los_Angeles
  prompt: |
    Reconcile this repo against its jaymin upstream. Follow your procedure
    exactly. Today's date is {{date}}. Cherry-pick candidates only, never a
    full merge. Produce the digest seed + the Sync Warden message, and
    propose an sd plan for the cherry-picks (do not dispatch it). If the
    fork is in sync, report in sync and exit.
